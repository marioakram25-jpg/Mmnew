<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Karen's Pharmacy Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        * { font-family: 'Tajawal', sans-serif; }
        body { background: #f8fafc; }
        .chat-scroll { height: 400px; overflow-y: auto; scroll-behavior: smooth; }
        .upload-zone { transition: all 0.3s ease; }
        .upload-zone.dragover { background: #dbeafe; border-color: #2563eb; }
        @keyframes stream { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .streaming { animation: stream 1.5s infinite; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-900 to-indigo-900 text-white py-16 px-6 text-center shadow-xl">
        <h1 class="text-5xl font-extrabold mb-4">Welcome Doctor Karen</h1>
        <h2 class="text-2xl font-light opacity-90">please upload the lecture and i will explain it deeply</h2>
    </header>

    <main class="container mx-auto max-w-6xl p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Main Content -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Upload Zone -->
                <div class="upload-zone bg-white p-12 rounded-2xl shadow-md border-2 border-dashed border-blue-300 text-center cursor-pointer hover:shadow-lg"
                     ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event)">
                    <input type="file" id="fileInput" class="hidden" accept=".jpg,.jpeg,.png,.pdf" onchange="handleFileSelect(event)">
                    <div onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt text-6xl text-blue-500 mb-4"></i>
                        <p class="text-xl font-bold text-gray-700 mb-2">اسحب الملفات هنا أو اضغط للرفع</p>
                        <p class="text-gray-400">يدعم: JPG, PNG, PDF</p>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loading" class="hidden bg-white p-8 rounded-2xl shadow-md flex items-center justify-center gap-4">
                    <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                    <span class="text-blue-900 font-bold text-lg">جاري تحليل المحاضرة بعمق...</span>
                </div>

                <!-- Explanation Area -->
                <div id="explanationArea" class="hidden bg-white p-8 rounded-2xl shadow-md border-r-8 border-blue-600">
                    <h3 class="text-2xl font-bold text-blue-900 mb-6 flex items-center">
                        <i class="fas fa-microscope ml-3"></i> شرح البروفيسور:
                    </h3>
                    <div id="aiResponse" class="text-right leading-relaxed text-lg space-y-4 text-gray-700">
                    </div>
                </div>
            </div>

            <!-- Chat Sidebar -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-lg flex flex-col h-[650px] border border-gray-200">
                    <div class="p-4 bg-blue-50 border-b font-bold text-blue-900 flex items-center gap-2 rounded-t-2xl">
                        <i class="fas fa-robot"></i>
                        <span>Chatbot Assistant</span>
                        <div class="w-2 h-2 bg-green-500 rounded-full ml-auto animate-pulse"></div>
                    </div>
                    
                    <div id="chatHistory" class="chat-scroll p-4 space-y-4 bg-gray-50/50 flex-1">
                        <div class="bg-blue-100 p-3 rounded-lg text-sm text-right">
                            أهلاً دكتورة كارين. أنا جاهز لمناقشة أي تفاصيل في المحاضرة.
                        </div>
                    </div>

                    <div class="p-4 border-t">
                        <div class="flex gap-2">
                            <input type="text" id="chatInput" placeholder="اسألي عن التفاصيل..." 
                                   class="flex-1 border-2 border-gray-200 rounded-lg px-4 py-2 focus:border-blue-500 outline-none transition">
                            <button onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentFileData = null;
        let conversationHistory = [];

        function dragOver(e) {
            e.preventDefault();
            document.querySelector('.upload-zone').classList.add('dragover');
        }

        function dragLeave(e) {
            document.querySelector('.upload-zone').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            document.querySelector('.upload-zone').classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) handleFileUpload(files[0]);
        }

        function handleFileSelect(e) {
            if (e.target.files.length) handleFileUpload(e.target.files[0]);
        }

        async function handleFileUpload(file) {
            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('explanationArea').classList.add('hidden');

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                currentFileData = await response.json();
                analyzeFile();
            } catch (error) {
                alert('خطأ في رفع الملف: ' + error);
                document.getElementById('loading').classList.add('hidden');
            }
        }

        async function analyzeFile() {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'اشرح هذه المحاضرة/الصورة بالتفصيل كما هو محدد في الـ system prompt.',
                    file_data: currentFileData
                })
            });

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('explanationArea').classList.remove('hidden');

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.content) {
                                fullText += data.content;
                                document.getElementById('aiResponse').innerHTML = fullText.replace(/\n/g, '<br>');
                            }
                        } catch (e) {}
                    }
                }
            }

            conversationHistory = [
                { role: 'user', message: 'اشرح هذه المحاضرة' },
                { role: 'assistant', message: fullText }
            ];
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML += `<div class="bg-blue-600 text-white p-3 rounded-lg text-sm text-right mr-4">` + message + `</div>`;
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        file_data: currentFileData
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let reply = '';

                const botMessage = document.createElement('div');
                botMessage.className = 'bg-white border p-3 rounded-lg text-sm text-right ml-4';
                chatHistory.appendChild(botMessage);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.content) {
                                    reply += data.content;
                                    botMessage.innerHTML = reply;
                                }
                            } catch (e) {}
                        }
                    }
                }

                chatHistory.scrollTop = chatHistory.scrollHeight;
            } catch (error) {
                console.error('خطأ:', error);
            }
        }
    </script>
</body>
</html>
